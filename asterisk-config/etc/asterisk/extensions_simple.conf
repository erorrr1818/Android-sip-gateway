; ═══════════════════════════════════════════════════
; dber88-sip | Простые маршруты звонков
; ═══════════════════════════════════════════════════

[general]
static=yes
writeprotect=no

; ─────────────────────────────────────────────────
; Внутренние звонки (MicroSIP ↔ Gateway)
; ─────────────────────────────────────────────────
[internal]

; Звонок к extension 101 (MicroSIP)
exten => 101,1,NoOp(Call to MicroSIP 101)
 same => n,Dial(PJSIP/101,60)
 same => n,VoiceMail(101@default,u)
 same => n,Hangup()

; Исходящий звонок через Mi 8 (любой номер)
; Поддерживает форматы: +79991234567, 79991234567, 89991234567
exten => _+7XXXXXXXXXX,1,NoOp(Outgoing via GSM: ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@gateway1,60)
 same => n,Hangup()

exten => _7XXXXXXXXXX,1,NoOp(Outgoing via GSM: ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@gateway1,60)
 same => n,Hangup()

exten => _8XXXXXXXXXX,1,NoOp(Outgoing via GSM: ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@gateway1,60)
 same => n,Hangup()

; Международные номера
exten => _+XXXXXXXXXXX,1,NoOp(Outgoing international via GSM: ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@gateway1,60)
 same => n,Hangup()

; ─────────────────────────────────────────────────
; Входящие от Mi 8 (кто-то звонит на SIM)
; ─────────────────────────────────────────────────
[from-gateways]

; Все входящие от шлюза — перенаправить на MicroSIP 101
exten => _X.,1,NoOp(Incoming GSM call: ${EXTEN})
 same => n,Set(GSM_CALLER=${PJSIP_HEADER(read,X-GSM-CallerID)})
 same => n,GotoIf($["${GSM_CALLER}" != ""]?set_caller:skip_caller)
 same => n(set_caller),Set(CALLERID(num)=${GSM_CALLER})
 same => n,Set(CALLERID(name)=${GSM_CALLER})
 same => n,NoOp(GSM CallerID: ${GSM_CALLER})
 same => n(skip_caller),Dial(PJSIP/101,60)
 same => n,Hangup()

; Если 101 не ответил
exten => h,1,NoOp(Call hangup)
 same => n,Hangup()
