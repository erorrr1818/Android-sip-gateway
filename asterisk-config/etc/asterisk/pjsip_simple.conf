; ═══════════════════════════════════════════════════
; dber88-sip | Простая конфигурация Asterisk PJSIP
; Для одного телефона Mi 8 + MicroSIP на ноутбуке
; ═══════════════════════════════════════════════════
;
; ЗАМЕНИ: YOUR_VPS_IP → IP твоего VPS-сервера
;         PASSWORD_MICROSIP → пароль для MicroSIP
;         PASSWORD_GATEWAY → пароль для Mi 8
;

[global]
type=global
endpoint_identifier_order=username,ip,anonymous

; UDP транспорт (без шифрования — проще для начала)
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; ─────────────────────────────────────────────────
; MicroSIP на ноутбуке (extension 101)
; ─────────────────────────────────────────────────
[101]
type=endpoint
context=internal
disallow=all
allow=opus
allow=ulaw
allow=alaw
allow=g722
auth=101
aors=101
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
trust_id_inbound=yes
send_rpid=yes

[101]
type=auth
auth_type=userpass
username=101
password=PASSWORD_MICROSIP

[101]
type=aor
qualify_frequency=30
max_contacts=3
remove_existing=yes

; ─────────────────────────────────────────────────
; Mi 8 GSM Gateway (SIM1)
; ─────────────────────────────────────────────────
[gateway1]
type=endpoint
context=from-gateways
disallow=all
allow=opus
allow=ulaw
allow=alaw
auth=gateway1
aors=gateway1
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
trust_id_inbound=yes
send_rpid=yes
callerid_privacy=allowed_passed_screened

[gateway1]
type=auth
auth_type=userpass
username=gateway1
password=PASSWORD_GATEWAY

[gateway1]
type=aor
qualify_frequency=30
max_contacts=2
remove_existing=no
